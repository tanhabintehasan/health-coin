[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  external_node_modules = ["@prisma/client", "prisma", "bcrypt", "passport-jwt"]
  included_files = ["dist/**", "prisma/schema.prisma"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/api/docs"
  to = "/.netlify/functions/api/api/docs"
  status = 200

[[redirects]]
  from = "/api/docs/*"
  to = "/.netlify/functions/api/api/docs/:splat"
  status = 200
