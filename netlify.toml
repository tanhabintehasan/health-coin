[build]
  command = "npm install && npm run build:web"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "22"
  VITE_API_BASE_URL = "https://health-coin.onrender.com/api/v1"
  VITE_DEMO_LOGIN_ENABLED = "true"

# SPA redirect: send all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
