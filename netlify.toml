[build]
  command = "npm install && npm run build"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "22"
  VITE_API_BASE_URL = "/api/v1"
  VITE_DEMO_LOGIN_ENABLED = "true"

[functions]
  directory = "apps/api/netlify/functions"
  external_node_modules = ["@prisma/client", "prisma", "bcrypt", "passport-jwt", "@nestjs/microservices", "@nestjs/websockets", "class-transformer"]
  included_files = ["apps/api/dist/**", "apps/api/prisma/schema.prisma"]

# API routes → Netlify Function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Swagger docs
[[redirects]]
  from = "/api/docs"
  to = "/.netlify/functions/api/api/docs"
  status = 200

[[redirects]]
  from = "/api/docs/*"
  to = "/.netlify/functions/api/api/docs/:splat"
  status = 200

# SPA fallback for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
